services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: testmanage
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ../test-manage-be/docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "appuser", "-papppassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  be:
    build:
      context: ../test-manage-be
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: appuser
      DB_PASSWORD: apppassword
      DB_NAME: testmanage
      HTTP_PORT: 8080
      GRPC_PORT: 9090
    ports:
      - "8080:8080"
      - "9090:9090"
    volumes:
      - ../test-manage-be:/app
    depends_on:
      db:
        condition: service_healthy

  be-swagger-ui:
    image: swaggerapi/swagger-ui:latest
    restart: unless-stopped
    environment:
      SWAGGER_JSON: /openapi/openapi.yaml
    ports:
      - "8088:8080"
    volumes:
      - ../test-manage-be/api/openapi.yaml:/openapi/openapi.yaml:ro
    depends_on:
      - be

  be-grpc-ui:
    image: fullstorydev/grpcui:latest
    restart: unless-stopped
    command: ["-plaintext", "-bind", "0.0.0.0", "-port", "8080", "be:9090"]
    ports:
      - "8089:8080"
    depends_on:
      - be

  bff:
    build:
      context: ../test-manage-bff
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      PORT: 8081
      BE_BASE_URL: http://be:8080
    ports:
      - "8081:8081"
    volumes:
      - ../test-manage-bff:/app
      - bff_node_modules:/app/node_modules
    depends_on:
      - be

  fe:
    build:
      context: ../test-manage-fe
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      VITE_BFF_BASE_URL: http://bff:8081
    ports:
      - "5173:5173"
    volumes:
      - ../test-manage-fe:/app
      - fe_node_modules:/app/node_modules
      # codegen 実行時に BFF のスキーマを参照するためのマウント
      - ../test-manage-bff/src/schema.graphql:/app/bff-schema.graphql:ro
    depends_on:
      - bff

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "443:4430"   # FE HTTPS (https://localhost/)
      - "8443:8443"  # BFF HTTPS
      - "8444:8444"  # BE HTTPS
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/ssl/certs:ro
    depends_on:
      - fe
      - bff
      - be

volumes:
  db_data:
  bff_node_modules:
  fe_node_modules:
